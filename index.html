<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>3학년6반 러닝챌린지</title>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #fff;
  --border: #e2e0db;
  --text: #1a1917;
  --muted: #6b6966;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --accent-text: #1d4ed8;
  --radius: 14px;
  --radius-sm: 10px;
  --tab-h: 56px;
  --header-h: 56px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.app-header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  flex-shrink: 0;
  gap: 0.5rem;
}

.app-header h1 {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}

.target-badge {
  font-size: 0.7rem;
  color: var(--accent-text);
  background: var(--accent-light);
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}

.btn-text {
  font-size: 0.75rem;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 9px;
  cursor: pointer;
  white-space: nowrap;
}

/* ── Scrollable content area ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.85rem 0.85rem calc(var(--tab-h) + 1rem);
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

/* ── Tab panels ── */
.tab-panel { display: none; flex-direction: column; gap: 0.75rem; }
.tab-panel.active { display: flex; }

/* ── D-Day banner ── */
.dday-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.85rem;
}

.dday-banner.hidden { display: none; }

.dday-num {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--accent-text);
  background: var(--accent-light);
  padding: 0.3rem 0.75rem;
  border-radius: 8px;
  line-height: 1;
  flex-shrink: 0;
}
.dday-num.today { background: var(--accent); color: #fff; }
.dday-num.past  { background: var(--bg); color: var(--muted); }

.dday-info { flex: 1; min-width: 0; }
.dday-name { font-size: 0.95rem; font-weight: 600; }
.dday-date { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

.dday-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: none;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--muted);
}
.btn-icon:active { background: var(--bg); }

/* ── Event form ── */
.event-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  display: none;
  flex-direction: column;
  gap: 0.7rem;
}
.event-form.open { display: flex; }
.form-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-bottom: 3px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
.form-input {
  width: 100%;
  padding: 0.75rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); background: #fff; }
.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.6; }

/* ── Summary cards ── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}
.scard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem 0.7rem;
  text-align: center;
}
.scard-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.scard-value { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.scard-sub { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }

/* ── Member progress ── */
.member-list { display: flex; flex-direction: column; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.member-row {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--bg);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.member-row:last-child { border-bottom: none; }

.member-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.member-name { font-size: 0.95rem; font-weight: 600; }
.member-stat { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }

.progress-bar { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* ── Chart ── */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.75rem 0.25rem 0.75rem 0.25rem;
}
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.85rem;
}
.chart-wrap { position: relative; height: 260px; }

/* ── Add record form (tab 2) ── */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

/* Name picker grid */
.name-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
}
.name-btn {
  padding: 0.75rem 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
  color: var(--text);
  text-align: center;
}
.name-btn.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent-text);
  font-weight: 700;
}
.name-btn:active { opacity: 0.75; }

/* km input row */
.km-row { display: flex; gap: 0.5rem; align-items: stretch; }
.km-input {
  flex: 1;
  padding: 0.85rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.3rem;
  font-weight: 600;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  text-align: center;
  letter-spacing: -0.02em;
}
.km-input:focus { border-color: var(--accent); background: #fff; }
.km-unit {
  display: flex;
  align-items: center;
  font-size: 1rem;
  font-weight: 600;
  color: var(--muted);
  padding: 0 0.5rem 0 0;
}

/* ── Pace input ── */
.pace-row { display: flex; gap: 0.5rem; align-items: center; }
.pace-input {
  width: 68px;
  padding: 0.85rem 0.4rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.3rem;
  font-weight: 600;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
  text-align: center;
}
.pace-input:focus { border-color: var(--accent); background: #fff; }
.pace-sep { font-size: 1.4rem; font-weight: 700; color: var(--muted); padding: 0 1px; }
.pace-unit { font-size: 0.85rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
.pace-optional { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
.record-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.record-pace { font-size: 0.72rem; color: var(--muted); font-variant-numeric: tabular-nums; }

/* ── Records (tab 3) ── */
.filter-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.8rem;
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  font-weight: 500;
}
.filter-chip.active {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

.records-list { display: flex; flex-direction: column; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.record-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--bg);
  gap: 0.5rem;
}
.record-item:last-child { border-bottom: none; }
.record-left { display: flex; flex-direction: column; gap: 2px; }
.record-name { font-size: 0.9rem; font-weight: 600; }
.record-ts { font-size: 0.72rem; color: var(--muted); }
.record-km { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent-text); }

.empty-msg { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 2rem 0; }

/* ── Bottom tab bar ── */
.tab-bar {
  height: var(--tab-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 0;
  transition: color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 1.3rem; line-height: 1; }

/* ── Personal page modal ── */
.person-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  flex-direction: column;
  overflow: hidden;
}
.person-modal.open { display: flex; }

.person-header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1rem;
  gap: 0.75rem;
  flex-shrink: 0;
}
.person-back {
  font-size: 1.2rem;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--accent);
  -webkit-tap-highlight-color: transparent;
}
.person-header-info { flex: 1; min-width: 0; }
.person-header-name { font-size: 1rem; font-weight: 700; }
.person-header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

.person-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.85rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.person-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}

.pace-chart-wrap { position: relative; height: 200px; }

/* ── date input in add form ── */
input[type="date"].form-date {
  width: 100%;
  padding: 0.75rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
}
input[type="date"].form-date:focus { border-color: var(--accent); background: #fff; }

/* ── Toast multiline ── */
.toast { text-align: center; line-height: 1.5; white-space: pre-line; }

/* ── Admin modal overlay ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.5rem 1.25rem 1.25rem;
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.modal h3 {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.modal-hint { font-size: 0.78rem; color: var(--muted); margin-top: -0.4rem; }
.modal-row { display: flex; gap: 0.5rem; }
.modal-row .form-input { flex: 1; }
.btn-cancel {
  flex: 1;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: none;
  font-size: 0.95rem;
  color: var(--muted);
  cursor: pointer;
}
.btn-danger {
  padding: 0.55rem 0.9rem;
  border: none;
  border-radius: var(--radius-sm);
  background: #fee2e2;
  color: #b91c1c;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-danger:active { opacity: 0.8; }

/* ── Admin tab panel ── */
.admin-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}
.admin-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.admin-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  color: #92400e;
  background: #fef3c7;
  padding: 2px 7px;
  border-radius: 6px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.logout-btn {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: none;
  font-size: 0.9rem;
  color: var(--muted);
  cursor: pointer;
  margin-top: 0.25rem;
}

/* delete btn on record rows */
.record-delete {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #fca5a5;
  border-radius: 8px;
  background: #fee2e2;
  color: #b91c1c;
  font-size: 0.8rem;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.record-delete:active { opacity: 0.7; }

/* ── Admin lock icon in header ── */
.admin-lock {
  font-size: 1rem;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  opacity: 0.4;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.admin-lock.active { opacity: 1; color: #d97706; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 0.75rem);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: #fff;
  padding: 0.6rem 1.25rem;
  border-radius: 20px;
  font-size: 0.85rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PC fallback ── */
@media (min-width: 600px) {
  .name-grid { grid-template-columns: repeat(4, 1fr); }
  .chart-wrap { height: 300px; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1 id="appTitle">🏃‍♀️ 3-6 러닝챌린지</h1>
  <div class="header-right">
    <div class="target-badge" id="targetBadge">목표 —km</div>
    <button class="admin-lock" id="adminLockBtn" onclick="onAdminLockClick()" title="관리자">🔒</button>
  </div>
</div>

<div class="content">

  <!-- Tab: 현황 -->
  <div class="tab-panel active" id="tab-home">

    <!-- D-Day banner (현황 탭에서만 표시) -->
    <div class="dday-banner hidden" id="eventBanner">
      <div class="dday-num" id="ddayChip">D-?</div>
      <div class="dday-info">
        <div class="dday-name" id="eventName">—</div>
        <div class="dday-date" id="eventDateLabel">—</div>
      </div>
      <div class="dday-actions">
        <button class="btn-icon" onclick="toggleEventForm()" title="수정" id="editEventBtn" style="display:none">✏️</button>
        <button class="btn-icon" onclick="deleteEvent()" title="삭제" id="deleteEventBtn" style="display:none">🗑</button>
      </div>
    </div>

    <!-- Event form (admin only) -->
    <div class="event-form" id="eventForm">
      <div>
        <label class="form-label" for="eventNameInput">대회 이름</label>
        <input class="form-input" type="text" id="eventNameInput" placeholder="예: 서울 마라톤">
      </div>
      <div>
        <label class="form-label" for="eventDateInput">날짜</label>
        <input class="form-input" type="date" id="eventDateInput">
      </div>
      <button class="btn-primary" onclick="saveEvent()" id="saveEventBtn">저장</button>
    </div>

    <div class="summary-row" style="grid-template-columns: repeat(3,1fr);">
      <div class="scard">
        <div class="scard-label">팀 누적</div>
        <div class="scard-value" id="summaryTotal">—</div>
        <div class="scard-sub" id="summaryTotalSub">km</div>
      </div>
      <div class="scard">
        <div class="scard-label">달성</div>
        <div class="scard-value" id="summaryAhead">—</div>
        <div class="scard-sub">명 / 8명</div>
      </div>
      <div class="scard">
        <div class="scard-label">선두</div>
        <div class="scard-value" id="summaryLeader" style="font-size:1.1rem;padding-top:3px">—</div>
        <div class="scard-sub" id="summaryLeaderKm">—</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-wrap" style="height:378px;">
        <canvas id="myChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Tab: 기록 추가 -->
  <div class="tab-panel" id="tab-add">
    <div class="add-form">
      <div>
        <label class="form-label">이름 선택</label>
        <div class="name-grid" id="nameGrid">
          <button class="name-btn selected" data-name="현서" onclick="selectName(this)">현서</button>
          <button class="name-btn" data-name="설희" onclick="selectName(this)">설희</button>
          <button class="name-btn" data-name="미정" onclick="selectName(this)">미정</button>
          <button class="name-btn" data-name="채림" onclick="selectName(this)">채림</button>
          <button class="name-btn" data-name="성은" onclick="selectName(this)">성은</button>
          <button class="name-btn" data-name="희연" onclick="selectName(this)">희연</button>
          <button class="name-btn" data-name="예선" onclick="selectName(this)">예선</button>
          <button class="name-btn" data-name="영채" onclick="selectName(this)">영채</button>
        </div>
      </div>
      <div>
        <label class="form-label">날짜</label>
        <input type="date" class="form-date" id="recordDate">
      </div>
      <div>
        <label class="form-label">거리</label>
        <div class="km-row">
          <input class="km-input" type="number" id="scoreInput" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
          <span class="km-unit">km</span>
        </div>
      </div>
      <div>
        <label class="form-label">평균 페이스 <span style="font-weight:400;text-transform:none">(선택)</span></label>
        <div class="pace-row">

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOR6JDTeZu9pk3_bcvN6oaa6KE0uUOyQ0",
  authDomain: "run3-6.firebaseapp.com",
  projectId: "run3-6",
  storageBucket: "run3-6.firebasestorage.app",
  messagingSenderId: "1095413394899",
  appId: "1:1095413394899:web:560a45543a50ccb8b81326"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection("records");
const eventCol = db.collection("events");

const MEMBERS = ["현서","설희","미정","채림","성은","희연","예선","영채"];
const COLORS = ["#2563eb","#7c3aed","#db2777","#ea580c","#16a34a","#0891b2","#d97706","#64748b"];
const ADMIN_PW = "admin";
const configCol = db.collection("config");

let chartInstance = null;
let allRecords = []; // each: { ...data, _id: docId }
let currentEventId = null;
let activeFilter = "";
let selectedName = "현서";
let isAdmin = false;
let challengeConfig = { startDate: "2026-05-06", endDate: null, totalKm: 30 };

// ── Admin auth ──
window.onAdminLockClick = function() {
  if (isAdmin) { adminLogout(); return; }
  document.getElementById("adminModal").classList.add("open");
  setTimeout(() => document.getElementById("adminPwInput").focus(), 100);
};

window.adminLogin = function() {
  const pw = document.getElementById("adminPwInput").value;
  if (pw === ADMIN_PW) {
    isAdmin = true;
    document.getElementById("adminPwInput").value = "";
    document.getElementById("adminModal").classList.remove("open");
    document.getElementById("adminTabBtn").style.display = "";
    document.getElementById("adminLockBtn").textContent = "🔓";
    document.getElementById("adminLockBtn").classList.add("active");
    // pre-fill admin fields
    document.getElementById("adminTitleInput").value = document.getElementById("appTitle").textContent;
    document.getElementById("adminStartDate").value = challengeConfig.startDate || "";
    document.getElementById("adminEndDate").value   = challengeConfig.endDate || "";
    document.getElementById("adminTotalKm").value   = challengeConfig.totalKm || "";
    document.getElementById("adminCurrentGoal").textContent = getTargetDistance();
    // show edit/delete on banner if event exists
    if (currentEventId) {
      document.getElementById("editEventBtn").style.display = "";
      document.getElementById("deleteEventBtn").style.display = "";
      syncAdminEventPanel(
        document.getElementById("eventName").textContent,
        document.getElementById("adminEventDateInput").value
      );
      document.getElementById("adminDeleteEventBtn").style.display = "";
    }
    renderRecords();
    showToast("관리자 모드 활성화됐어요.");
  } else {
    showToast("비밀번호가 틀렸어요.");
    document.getElementById("adminPwInput").value = "";
  }
};

window.closeAdminModal = function() {
  document.getElementById("adminModal").classList.remove("open");
  document.getElementById("adminPwInput").value = "";
};

window.adminLogout = function() {
  isAdmin = false;
  document.getElementById("adminTabBtn").style.display = "none";
  document.getElementById("adminLockBtn").textContent = "🔒";
  document.getElementById("adminLockBtn").classList.remove("active");
  // hide edit/delete buttons on banner
  document.getElementById("editEventBtn").style.display = "none";
  document.getElementById("deleteEventBtn").style.display = "none";
  document.getElementById("eventForm").classList.remove("open");
  // switch away from admin tab if active
  const adminPanel = document.getElementById("tab-admin");
  if (adminPanel.classList.contains("active")) {
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-home").classList.add("active");
    document.querySelector(".tab-btn").classList.add("active");
  }
  renderRecords();
  showToast("로그아웃됐어요.");
};

// ── Admin: save title to Firebase config ──
window.adminSaveTitle = async function() {
  const title = document.getElementById("adminTitleInput").value.trim();
  if (!title) { showToast("타이틀을 입력해주세요."); return; }
  try {
    await configCol.doc("settings").set({ title }, { merge: true });
    document.getElementById("appTitle").textContent = title;
    document.title = title.replace(/[\u{1F000}-\u{1FFFF}]/gu, "").trim() || title;
    showToast("타이틀이 저장됐어요.");
  } catch(e) { showToast("저장 실패."); }
};

// ── Admin: save challenge config ──
window.adminSaveChallengeConfig = async function() {
  const startDate = document.getElementById("adminStartDate").value;
  const endDate   = document.getElementById("adminEndDate").value;
  const totalKm   = parseFloat(document.getElementById("adminTotalKm").value);
  if (!startDate || !endDate || isNaN(totalKm) || totalKm < 1) {
    showToast("시작일, 목표일, 목표 거리를 모두 입력해주세요."); return;
  }
  if (new Date(endDate) <= new Date(startDate)) {
    showToast("목표 날짜는 시작 날짜보다 이후여야 해요."); return;
  }
  try {
    challengeConfig = { startDate, endDate, totalKm };
    await configCol.doc("settings").set({ challengeConfig }, { merge: true });
    const target = getTargetDistance();
    document.getElementById("adminCurrentGoal").textContent = target;
    const dataMap = buildDataMap();
    renderSummary(dataMap, target);
    renderChart(dataMap, target);
    showToast(`저장됐어요. 오늘 목표 ${target}km`);
  } catch(e) { showToast("저장 실패."); }
};

// ── Admin: delete record ──
window.adminDeleteRecord = async function(docId, name, km) {
  if (!isAdmin) return;
  if (!confirm(`${name} ${km}km 기록을 삭제할까요?`)) return;
  try {
    await col.doc(docId).delete();
    showToast("삭제됐어요.");
    await refresh();
  } catch(e) { showToast("삭제 실패."); }
};

// ── Date default ──
function initDateInput() {
  const now = new Date();
  const kst = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + 9 * 3600000);
  const y = kst.getFullYear();
  const m = String(kst.getMonth()+1).padStart(2,"0");
  const d = String(kst.getDate()).padStart(2,"0");
  document.getElementById("recordDate").value = `${y}-${m}-${d}`;
}

// ── Personal page ──
let paceChartInstance = null;

window.openPersonModal = function(name) {
  const modal = document.getElementById("personModal");
  modal.classList.add("open");

  const recs = allRecords
    .filter(r => r.name === name)
    .sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));

  const totalKm = recs.reduce((s,r) => s + r.score, 0);
  const paceRecs = recs.filter(r => r.paceSeconds);
  const avgPace = paceRecs.length
    ? paceRecs.reduce((s,r) => s + r.paceSeconds, 0) / paceRecs.length
    : null;

  // header
  const colorIdx = MEMBERS.indexOf(name);
  const color = COLORS[colorIdx] || "#2563eb";
  document.getElementById("personName").textContent = name;
  document.getElementById("personSub").textContent =
    `총 ${totalKm.toFixed(2)}km · ${recs.length}회`;

  const target = getTargetDistance();
  const remainKm = parseFloat(Math.max(0, target - totalKm).toFixed(2));
  const remainBg = remainKm > 0 ? "background:#fef2f2;border-color:#fca5a5;" : "";
  const remainColor = remainKm > 0 ? "color:#b91c1c;" : "";

  // stats cards
  document.getElementById("personStats").innerHTML = `
    <div class="scard">
      <div class="scard-label">누적</div>
      <div class="scard-value">${totalKm.toFixed(1)}</div>
      <div class="scard-sub">km</div>
    </div>
    <div class="scard">
      <div class="scard-label">평균 페이스</div>
      <div class="scard-value" style="font-size:1.1rem;padding-top:3px">${avgPace ? fmtPace(avgPace) : "—"}</div>
      <div class="scard-sub">/km</div>
    </div>
    <div class="scard" style="${remainBg}">
      <div class="scard-label" style="${remainColor}">잔여</div>
      <div class="scard-value" style="font-size:1.1rem;padding-top:3px;${remainColor}">${remainKm.toFixed(2)}</div>
      <div class="scard-sub" style="${remainColor}">km</div>
    </div>`;

  // pace trend chart
  const paceCtx = document.getElementById("paceChart").getContext("2d");
  if (paceChartInstance) paceChartInstance.destroy();

  if (paceRecs.length >= 2) {
    paceChartInstance = new Chart(paceCtx, {
      type: "line",
      data: {
        labels: paceRecs.map(r => fmtDate(r.timestamp)),
        datasets: [{
          data: paceRecs.map(r => r.paceSeconds),
          borderColor: color,
          backgroundColor: color + "22",
          borderWidth: 2,
          pointBackgroundColor: color,
          pointRadius: 4,
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: c => " " + fmtPace(c.raw) + "/km" },
          titleFont: { size: 12 }, bodyFont: { size: 12 }
        }},
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, color: "#6b6966", maxRotation: 30 } },
          y: {
            reverse: true,
            grid: { color: "#e2e0db" },
            ticks: {
              font: { size: 10 }, color: "#6b6966",
              callback: v => fmtPace(v)
            }
          }
        }
      }
    });
  } else {
    paceCtx.canvas.parentElement.innerHTML =
      `<div class="pace-chart-wrap"><div class="empty-msg" style="padding-top:4rem">페이스 기록이 2개 이상 있어야<br>추이를 볼 수 있어요.</div></div>`;
  }

  // records list
  const sorted = [...recs].reverse();
  document.getElementById("personRecords").innerHTML = sorted.length
    ? sorted.map(r => {
        const pace = r.paceSeconds ? fmtPace(r.paceSeconds) + "/km" : null;
        return `<div class="record-item">
          <div class="record-left">
            <span class="record-name">${fmtDate(r.timestamp)}</span>
          </div>
          <div class="record-right">
            <span class="record-km">${r.score.toFixed(2)}km</span>
            ${pace ? `<span class="record-pace">${pace}</span>` : ""}
          </div>
        </div>`;
      }).join("")
    : `<div class="empty-msg">기록이 없어요.</div>`;
};

window.closePersonModal = function() {
  document.getElementById("personModal").classList.remove("open");
  if (paceChartInstance) { paceChartInstance.destroy(); paceChartInstance = null; }
};
window.switchTab = function(tab, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

// ── Name picker ──
window.selectName = function(btn) {
  document.querySelectorAll(".name-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedName = btn.dataset.name;

// ── Filter chips ──
window.setFilter = function(btn) {
  document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeFilter = btn.dataset.filter;
  renderRecords();

// ── Utils ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function fmtDate(iso) {
  const d = new Date(iso);
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function getTargetDistance() {
  const { startDate, endDate, totalKm } = challengeConfig;
  const now = new Date();
  const kst = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + 9 * 3600000);
  const today = new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
  const start = new Date(startDate + "T00:00:00");

  if (endDate) {
    const end = new Date(endDate + "T00:00:00");
    const totalDays = Math.max(1, Math.round((end - start) / 86400000));
    const elapsed = Math.max(0, Math.min(totalDays, Math.round((today - start) / 86400000) + 1));
    return parseFloat(((totalKm * elapsed) / totalDays).toFixed(2));
  } else {
    // fallback: legacy 1km/day up to totalKm
    const days = Math.max(0, Math.floor((today - start) / 86400000) + 1);
    return Math.min(totalKm, days);
  }
}

function calcDday(dateStr) {
  const now = new Date();
  const kst = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + 9 * 3600000);
  const today = new Date(kst.getFullYear(), kst.getMonth(), kst.getDate());
  const target = new Date(dateStr + "T00:00:00");
  return Math.round((target - today) / 86400000);
}

function buildDataMap() {
  const map = {};
  MEMBERS.forEach(n => map[n] = { km: 0, paceSum: 0, paceCount: 0 });
  allRecords.forEach(r => {
    if (map[r.name] !== undefined) {
      map[r.name].km += r.score;
      if (r.paceSeconds) {
        map[r.name].paceSum += r.paceSeconds;
        map[r.name].paceCount += 1;
      }
    }
  });
  return map;
}

function fmtPace(seconds) {
  if (!seconds || seconds <= 0) return null;
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return `${m}′${String(s).padStart(2,"0")}″`;
}

function avgPaceSeconds(paceSum, paceCount) {
  return paceCount > 0 ? paceSum / paceCount : null;
}

// ── Render: summary ──
function renderSummary(dataMap, target) {
  const entries = Object.values(dataMap);
  const total = entries.reduce((a,b) => a + b.km, 0);
  const teamTotal = parseFloat(total.toFixed(1));
  const teamRemain = parseFloat(Math.max(0, target * MEMBERS.length - teamTotal).toFixed(1));
  const ahead = entries.filter(v => v.km >= target).length;
  const sorted = Object.entries(dataMap).sort((a,b) => b[1].km - a[1].km);
  document.getElementById("summaryTotal").textContent = teamTotal;
  document.getElementById("summaryTotalSub").textContent = `잔여 ${teamRemain}km`;
  document.getElementById("summaryAhead").textContent = ahead;
  document.getElementById("summaryLeader").textContent = sorted[0][0];
  document.getElementById("summaryLeaderKm").textContent = sorted[0][1].km.toFixed(1) + "km";
  document.getElementById("targetBadge").textContent = `목표 ${challengeConfig.totalKm}km`;
}

// ── Render: member list ──
function renderMemberList(dataMap, target) {
  const sorted = Object.entries(dataMap).sort((a,b) => b[1].km - a[1].km);
  const medals = ["🥇","🥈","🥉"];
  document.getElementById("memberList").innerHTML = sorted.map(([name, data], i) => {
    const { km, paceSum, paceCount } = data;
    const pct = Math.min(100, target > 0 ? (km / target) * 100 : 0);
    const color = COLORS[MEMBERS.indexOf(name)];
    const remain = Math.max(0, target - km);
    const medal = medals[i] || "";
    const avgPace = avgPaceSeconds(paceSum, paceCount);
    const paceStr = avgPace ? `· 평균 ${fmtPace(avgPace)}/km` : "";
    return `<div class="member-row">
      <div class="member-info">
        <span class="member-name">${medal ? medal+" " : ""}${name}</span>
        <span class="member-stat">${km.toFixed(2)}km · 잔여 ${remain.toFixed(2)}km ${paceStr}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join("");
}

// ── Render: chart (single bar + text labels + dashed target line) ──
function renderChart(dataMap, target) {
  const sorted = Object.entries(dataMap).sort((a,b) => b[1].km - a[1].km);
  const medals  = ["🥇","🥈","🥉"];
  const labels   = sorted.map(([n],i) => medals[i] ? medals[i]+" "+n : n);
  const achieved = sorted.map(([,d]) => parseFloat(d.km.toFixed(2)));
  const colors   = sorted.map(([n]) => COLORS[MEMBERS.indexOf(n)]);
  const paces    = sorted.map(([,d]) => avgPaceSeconds(d.paceSum, d.paceCount));

  const ctx = document.getElementById("myChart").getContext("2d");
  if (chartInstance) chartInstance.destroy();

  // Custom plugin: line1: "5.20km (-4.80km)"  line2: pace
  const labelPlugin = {
    id: "barLabels",
    afterDatasetsDraw(chart) {
      const { ctx: c, scales: { x, y } } = chart;
      chart.getDatasetMeta(0).data.forEach((bar, i) => {
        const km = achieved[i];
        const pace = paces[i];
        const remain = Math.max(0, target - km);
        const xEnd = x.getPixelForValue(Math.max(km, 0));
        const yMid = bar.y;
        const barH = bar.height;
        const fontSize = Math.min(12, barH * 0.42);
        const smallSize = Math.min(10, barH * 0.34);
        const paceTxt = pace ? fmtPace(pace) + "/km" : null;
        const lineH = paceTxt ? barH * 0.28 : 0;
        const baseY = yMid - (paceTxt ? lineH / 2 : 0);

        const xOrigin = x.getPixelForValue(0);

        c.save();
        c.textBaseline = "middle";

        // measure widths for inside/outside decision
        c.font = `600 ${fontSize}px -apple-system, sans-serif`;
        const kmW = c.measureText(km.toFixed(2) + "km").width;
        c.font = `400 ${smallSize}px -apple-system, sans-serif`;
        const remStr = remain > 0 ? ` (-${remain.toFixed(2)}km)` : " ✓";
        const remW = c.measureText(remStr).width;
        const totalW = kmW + remW;

        const inside = (xEnd - xOrigin) > totalW + 16;

        if (inside) {
          const startX = xEnd - totalW - 8;
          // km (bold)
          c.font = `600 ${fontSize}px -apple-system, sans-serif`;
          c.fillStyle = "#fff";
          c.fillText(km.toFixed(2) + "km", startX, baseY);
          // remain (normal)
          c.font = `400 ${smallSize}px -apple-system, sans-serif`;
          c.fillStyle = remain > 0 ? "rgba(255,180,180,0.95)" : "rgba(255,255,255,0.7)";
          c.fillText(remStr, startX + kmW, baseY);
          // pace
          if (paceTxt) {
            c.font = `400 ${smallSize}px -apple-system, sans-serif`;
            c.fillStyle = "rgba(255,255,255,0.75)";
            c.fillText(paceTxt, xEnd - c.measureText(paceTxt).width - 8, baseY + lineH);
          }
        } else {
          const startX = xEnd + 6;
          // km (bold)
          c.font = `600 ${fontSize}px -apple-system, sans-serif`;
          c.fillStyle = "#1a1917";
          c.fillText(km > 0 ? km.toFixed(2) + "km" : "0km", startX, baseY);
          // remain (normal)
          c.font = `400 ${smallSize}px -apple-system, sans-serif`;
          c.fillStyle = remain > 0 ? "#b91c1c" : "#16a34a";
          c.fillText(remStr, startX + (km > 0 ? kmW : c.measureText("0km").width), baseY);
          // pace
          if (paceTxt) {
            c.font = `400 ${smallSize}px -apple-system, sans-serif`;
            c.fillStyle = "#6b6966";
            c.fillText(paceTxt, startX, baseY + lineH);
          }
        }
        c.restore();
      });
    }
  };

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "달성",
        data: achieved,
        backgroundColor: colors.map(c => c + "cc"),
        borderColor: colors,
        borderWidth: 0,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      onClick(e, elements) {
        if (elements.length) {
          const name = sorted[elements[0].index][0];
          openPersonModal(name);
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
        annotation: {
          annotations: {
            targetLine: {
              type: "line",
              xMin: target,
              xMax: target,
              borderColor: "#ef4444",
              borderWidth: 1.5,
              borderDash: [5, 4],
              label: {
                display: true,
                content: `목표 ${target}km`,
                position: "end",
                backgroundColor: "#ef4444",
                color: "#fff",
                font: { size: 11, weight: "600" },
                padding: { x: 6, y: 3 },
                yAdjust: 6
              }
            }
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          max: Math.max(target * 1.1, ...achieved, 1),
          grid: { color: "#e2e0db" },
          ticks: { font: { size: 11 }, color: "#6b6966" }
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 13 }, color: "#1a1917" }
        }
      },
      onHover(e, elements) {
        e.native.target.style.cursor = elements.length ? "pointer" : "default";
      }
    },
    plugins: [Chart.registry.getPlugin("annotation"), labelPlugin]
  });
}

// ── Render: records ──
function renderRecords() {
  const rows = activeFilter ? allRecords.filter(r => r.name === activeFilter) : allRecords;
  const sorted = [...rows].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  const container = document.getElementById("recordsList");
  if (!sorted.length) {
    container.innerHTML = `<div class="empty-msg">기록이 없어요.</div>`;
    return;
  }
  container.innerHTML = sorted.map(r => {
    const pace = r.paceSeconds ? fmtPace(r.paceSeconds) + "/km" : null;
    const delBtn = isAdmin
      ? `<button class="record-delete" onclick="adminDeleteRecord('${r._id}','${r.name}',${r.score})" title="삭제">✕</button>`
      : "";
    return `<div class="record-item">
      <div class="record-left">
        <span class="record-name">${r.name}</span>
        <span class="record-ts">${fmtDate(r.timestamp)}</span>
      </div>
      <div class="record-right">
        <span class="record-km">${r.score.toFixed(2)}km</span>
        ${pace ? `<span class="record-pace">${pace}</span>` : ""}
      </div>
      ${delBtn}
    </div>`;
  }).join("");
}

// ── Refresh all ──
async function refresh() {
  const snap = await col.get();
  allRecords = snap.docs
    .map(d => ({ ...d.data(), _id: d.id }))
    .filter(r => r.score && r.score !== 0);
  const target = getTargetDistance();
  const dataMap = buildDataMap();
  renderSummary(dataMap, target);
  renderChart(dataMap, target);
  renderRecords();
}

async function loadConfig() {
  try {
    const doc = await configCol.doc("settings").get();
    if (doc.exists) {
      const data = doc.data();
      if (data.title) document.getElementById("appTitle").textContent = data.title;
      if (data.challengeConfig) challengeConfig = { ...challengeConfig, ...data.challengeConfig };
    }
  } catch(e) {}
}

// ── Add record ──
window.addRecord = async function() {
  const score = parseFloat(document.getElementById("scoreInput").value);
  if (!selectedName || isNaN(score) || score <= 0) {
    showToast("이름과 거리를 확인해주세요.");
    return;
  }
  const paceMinVal = document.getElementById("paceMin").value;
  const paceSecVal = document.getElementById("paceSec").value;
  let paceSeconds = null;
  if (paceMinVal !== "" || paceSecVal !== "") {
    const m = parseInt(paceMinVal) || 0;
    const s = parseInt(paceSecVal) || 0;
    if (m >= 0 && s >= 0 && s < 60 && (m + s) > 0) {
      paceSeconds = m * 60 + s;
    } else {
      showToast("페이스 형식을 확인해주세요. (예: 5분 30초)");
      return;
    }
  }

  // date — use selected date at noon KST to avoid timezone shift
  const dateVal = document.getElementById("recordDate").value;
  const timestamp = dateVal
    ? new Date(dateVal + "T12:00:00+09:00").toISOString()
    : new Date().toISOString();

  const btn = document.getElementById("addBtn");
  btn.disabled = true; btn.textContent = "저장 중...";
  try {
    const payload = { name: selectedName, score, timestamp };
    if (paceSeconds !== null) payload.paceSeconds = paceSeconds;
    await col.add(payload);
    document.getElementById("scoreInput").value = "";
    document.getElementById("paceMin").value = "";
    document.getElementById("paceSec").value = "";
    initDateInput();
    const paceMsg = paceSeconds ? ` · ${fmtPace(paceSeconds)}/km` : "";
    showToast(`${selectedName} ${score}km${paceMsg} 추가됐어요 👏\n고생하셨습니다 👏👏👏`);
    await refresh();
  } catch(e) {
    showToast("저장 실패. 다시 시도해주세요.");
  }
  btn.disabled = false; btn.textContent = "기록 추가";
};

// ── Event / D-Day ──
function renderEvent(name, dateStr) {
  const diff = calcDday(dateStr);
  const chip = document.getElementById("ddayChip");
  if (diff > 0)      { chip.textContent = `D-${diff}`; chip.className = "dday-num"; }
  else if (diff===0) { chip.textContent = "D-Day";     chip.className = "dday-num today"; }
  else               { chip.textContent = `D+${Math.abs(diff)}`; chip.className = "dday-num past"; }
  document.getElementById("eventName").textContent = name;
  const d = new Date(dateStr + "T00:00:00");
  document.getElementById("eventDateLabel").textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById("eventBanner").classList.remove("hidden");
  // admin-only edit/delete buttons on banner
  const show = isAdmin ? "" : "none";
  document.getElementById("editEventBtn").style.display = show;
  document.getElementById("deleteEventBtn").style.display = show;
  // sync admin panel
  syncAdminEventPanel(name, dateStr);
}

function syncAdminEventPanel(name, dateStr) {
  if (!document.getElementById("adminEventNameInput")) return;
  document.getElementById("adminEventNameInput").value = name || "";
  document.getElementById("adminEventDateInput").value = dateStr || "";
  document.getElementById("adminEventStatus").textContent = name ? `현재: ${name}` : "등록된 대회 없음";
  if (document.getElementById("adminDeleteEventBtn")) {
    document.getElementById("adminDeleteEventBtn").style.display = currentEventId ? "" : "none";
  }
}

async function loadEvent() {
  try {
    const snap = await eventCol.orderBy("createdAt","desc").limit(1).get();
    if (!snap.empty) {
      const doc = snap.docs[0];
      currentEventId = doc.id;
      const { name, date } = doc.data();
      renderEvent(name, date);
    }
  } catch(e) {}
}

// admin: save event
window.adminSaveEvent = async function() {
  const name = document.getElementById("adminEventNameInput").value.trim();
  const date = document.getElementById("adminEventDateInput").value;
  if (!name || !date) { showToast("이름과 날짜를 입력해주세요."); return; }
  const btn = document.getElementById("adminSaveEventBtn");
  btn.disabled = true; btn.textContent = "저장 중...";
  try {
    const payload = { name, date, createdAt: new Date().toISOString() };
    if (currentEventId) await eventCol.doc(currentEventId).set(payload);
    else { const ref = await eventCol.add(payload); currentEventId = ref.id; }
    renderEvent(name, date);
    showToast(`${name} 등록됐어요 🏁`);
  } catch(e) { showToast("저장 실패."); }
  btn.disabled = false; btn.textContent = "저장";
};

// admin: delete event
window.adminDeleteEvent = async function() {
  if (!currentEventId) return;
  try {
    await eventCol.doc(currentEventId).delete();
    currentEventId = null;
    document.getElementById("eventBanner").classList.add("hidden");
    document.getElementById("eventForm").classList.remove("open");
    syncAdminEventPanel("", "");
    showToast("대회 일정이 삭제됐어요.");
  } catch(e) { showToast("삭제 실패."); }
};

window.toggleEventForm = function() {
  if (!isAdmin) return;
  const form = document.getElementById("eventForm");
  form.classList.toggle("open");
};

window.onload = async function() {
  initDateInput();
  await loadConfig();
  await loadEvent();
  await refresh();
};
</script>
</body>
</html>
